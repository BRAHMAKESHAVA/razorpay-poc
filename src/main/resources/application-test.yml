app:
  cors:
    allowed-origins:
      - "*"

twilio:
  account:
    sid: ${TWILIO_SID}
  auth:
    token: ${TWILIO_AUTH_TOKEN}
  sms:
    from: ${TWILIO_SMS_FROM}
  whatsapp:
    sandbox: ${TWILIO_WHATSAPP_SANDBOX}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}